<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modeling Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="icon-clock.png" alt="logo" class="logo-icon">
            <span>Modeling time</span>
        </div>
        
        <div class="search-container">
            <input type="text" placeholder="Search...">
            <button class="search-btn">🔍</button>
        </div>

        <div class="auth-buttons">
            <button class="btn-signup">Sign Up</button>
            <button class="btn-login">Log In</button>
        </div>

        <button class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

 <main class="hero">
    <div class="hero-content">
        <h4>Вы с нуля освоите полный цикл создания 3D модели, научитесь моделировать объекты и добавлять им реализма. Соберёте портфолио, сможете зарабатывать на фрилансе или начать карьеру в играх и кино.</h4>
        
        <button class="cta-button">Попробуй сейчас !</button>

        <div class="software-icons">
            <img src="blender.png" alt="Blender">
            <img src="3dsmax.png" alt="3dsMax">
            <img src="cinema4d.png" alt="Cinema4D">
        </div>
    </div>

    <div class="hero-image">
        <img src="hourglass-wireframe.png" alt="3D Hourglass">
    </div>
	</main>

    <aside class="side-menu" id="sideMenu">
        <div class="menu-header">Modeling time</div>
        <nav>
            <ul>
                <li><a href="#">Личный кабинет</a></li>
                <li><a href="#">Курсы</a></li>
                <li><a href="#">Контакты и ссылки</a></li>
            </ul>
        </nav>
    </aside>

    <div class="overlay" id="overlay"></div>

    <script src="script.js"></script>
</body>
</html>
